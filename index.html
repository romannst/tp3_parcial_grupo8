<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Visual</title>
</head>
<body>
    <!-- popup de bienvenida aparece al inicio y se oculta el display al apretar el boton de jugar -->
    <div class="bienvenida">
        <h1>Bienvenido al juego Memoria Visual</h1>

        <button class="btn-jugar" id="jugar">Jugar</button>  
    </div>
    <div class="contendor-body">
        <header>
            <h1 class="titulo-header">Memoria Visual</h1>
        </header>
        <main>
            <div class="contenedor-main">
                <section class="juego">
                    <div class="stats-juego">
                        <span class="stats-aciertos">Aciertos: </span>
                        <span class="stats-puntos">Puntaje: </span>
                        <span class="stats-tiempo">Tiempo: </span>
                    </div>
                    <div class="tablero-juego" id="juego">

                    </div>
                    <button class="btn-reiniciar" id="reiniciar">Reiniciar</button>
                </section>                
            </div>
        </main>
        <footer>
            <p>&copy; 2026 Memoria Visual. Todos los derechos reservados.</p>
        </footer>        
    </div>
    <!-- popup cuando se gana, se cambia su display para mostrar -->
    <div class="ganaste">
        <h2>¡Felicidades, ganaste! 🎉</h2>
        <button class="btn-jugar">Jugar de nuevo</button>
    </div>
</body>
</html>
